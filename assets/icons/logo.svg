<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Mundo do Octógono</title>
  <!-- Octógono externo -->
  <path
    d="M31.65 5.52 L42.48 16.35 L42.48 31.65 L31.65 42.48 L16.35 42.48 L5.52 31.65 L5.52 16.35 L16.35 5.52 Z"
    stroke="currentColor"
    stroke-width="2.6"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Octógono interno (linha fina, cria sensação de profundidade/ringue) -->
  <path
    d="M27.8 13.2 L34.8 20.2 L34.8 27.8 L27.8 34.8 L20.2 34.8 L13.2 27.8 L13.2 20.2 L20.2 13.2 Z"
    stroke="currentColor"
    stroke-width="1"
    stroke-opacity="0.35"
    fill="none"
  />
  <!-- Acento diagonal (vermelho) simbolizando movimento/golpe -->
  <path
    d="M17 30 L24 18.5 L31 30"
    stroke="#a8172b"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
